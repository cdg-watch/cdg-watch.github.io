<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CDG Watch — コムデギャルソン情報トラッカー</title>
<style>
  /* CDG Watch — editorial monochrome. 白黒・ハードエッジ・余白・PLAYの赤を差し色に */
  :root {
    color-scheme: light dark;
    --bg: #ffffff; --fg: #0a0a0a; --muted: #8a8a8a;
    --card: #ffffff; --line: #111111; --hair: #e4e4e4; --accent: #e10029;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0a0a0a; --fg: #f2f2f2; --muted: #7d7d7d;
            --card: #0a0a0a; --line: #f2f2f2; --hair: #242424; --accent: #ff2d4f; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
         font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN",
                      "Hiragino Sans", "Noto Sans JP", sans-serif;
         -webkit-font-smoothing: antialiased; }
  header { padding: 2.5rem 1.5rem 0; max-width: 900px; margin: 0 auto; }

  /* マストヘッド */
  h1 { margin: 0; font-size: clamp(2rem, 7vw, 3.2rem); font-weight: 400;
       letter-spacing: .18em; text-transform: uppercase; line-height: 1; }
  h1 span { color: var(--accent); }
  .meta { color: var(--muted); font-size: .72rem; margin-top: .9rem;
          letter-spacing: .08em; text-transform: uppercase; }
  .links { font-size: .72rem; margin-top: .5rem; line-height: 2;
           letter-spacing: .04em; text-transform: uppercase; }
  .links a { color: var(--fg); text-decoration: none; margin-right: 1rem;
             border-bottom: 1px solid var(--accent); padding-bottom: 1px; }
  .links a:hover { color: var(--accent); }

  /* ビュー切替タブ */
  .tabs { display: flex; gap: 0; margin-top: 2rem; flex-wrap: wrap;
          border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
  .tab { padding: .7rem 1.1rem; cursor: pointer; font-size: .74rem; color: var(--muted);
         border: none; background: none; letter-spacing: .1em; text-transform: uppercase;
         border-right: 1px solid var(--hair); }
  .tab.active { color: var(--bg); background: var(--fg); font-weight: 500; }

  .controls { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: 1.3rem; }
  input[type="search"], select {
    padding: .55rem .8rem; border: 1px solid var(--line); border-radius: 0;
    background: var(--bg); color: var(--fg); font-size: .85rem;
    font-family: inherit; letter-spacing: .03em;
  }
  input[type="search"] { flex: 1; min-width: 200px; }

  /* カテゴリのチップ */
  .chips { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: 1rem; }
  .chip { padding: .35rem .85rem; border: 1px solid var(--hair); border-radius: 0;
          background: var(--bg); color: var(--muted); font-size: .72rem; cursor: pointer;
          letter-spacing: .06em; text-transform: uppercase; font-family: inherit; }
  .chip.active { border-color: var(--fg); color: var(--fg); font-weight: 500; }

  main { max-width: 900px; margin: 0 auto; padding: 0 1.5rem 5rem; }

  /* セクション見出し(エディトリアル) */
  .highlights { margin-top: 2rem; }
  .highlights h2, .day > h2 { font-size: .7rem; color: var(--fg); letter-spacing: .16em;
                   text-transform: uppercase; font-weight: 600; margin: 0 0 .9rem;
                   padding-bottom: .5rem; border-bottom: 2px solid var(--fg); }

  /* 今日の要点 */
  .hl-card { display: flex; gap: 1rem; padding: .9rem 0; border-bottom: 1px solid var(--hair);
             align-items: center; }
  .hl-card a { color: var(--fg); text-decoration: none; font-weight: 600; font-size: 1rem;
               line-height: 1.45; flex: 1; letter-spacing: .01em; }
  .hl-card a:hover { color: var(--accent); }
  .hl-card img { width: 64px; height: 64px; object-fit: cover; flex-shrink: 0; }

  /* 記事カード(フラット・罫線区切り) */
  .day { margin-top: 2.2rem; }
  .card { padding: 1.1rem 0; margin: 0; border-bottom: 1px solid var(--hair);
          display: flex; gap: 1.2rem; align-items: flex-start; }
  .card .body { flex: 1; min-width: 0; }
  .card a.title { color: var(--fg); text-decoration: none; font-weight: 600; line-height: 1.5;
                  font-size: 1.02rem; letter-spacing: .01em; }
  .card a.title:hover { color: var(--accent); }
  .card .src { color: var(--muted); font-size: .68rem; margin-top: .4rem;
               letter-spacing: .08em; text-transform: uppercase; }
  .card .summary { font-size: .88rem; line-height: 1.8; margin-top: .55rem; color: var(--fg); }
  .tags { margin-top: .55rem; }
  .tag { display: inline-block; font-size: .64rem; color: var(--muted);
         border: 1px solid var(--hair); border-radius: 0; letter-spacing: .06em;
         padding: .1rem .5rem; margin-right: .3rem; text-transform: uppercase; }
  .card .thumb { width: 110px; height: 110px; object-fit: cover; flex-shrink: 0;
                 background: var(--hair); }
  @media (max-width: 480px) { .card .thumb { width: 80px; height: 80px; } }
  .fav { background: none; border: none; cursor: pointer; font-size: 1.05rem;
         color: var(--muted); padding: 0 0 0 .4rem; line-height: 1; }
  .fav.on { color: var(--accent); }

  /* カレンダー */
  .cal-day { margin-top: 1.6rem; }
  .cal-date { font-weight: 700; font-size: 1.05rem; letter-spacing: .04em; }
  .cal-date .dow { color: var(--muted); font-weight: 400; font-size: .82rem; margin-left: .4rem; }
  .cal-until { color: var(--accent); font-size: .7rem; margin-left: .6rem;
               letter-spacing: .08em; text-transform: uppercase; }
  .cal-entry { padding: .7rem 0; margin: 0; border-bottom: 1px solid var(--hair);
               font-size: .9rem; line-height: 1.6; }
  .cal-entry .kind { font-size: .62rem; color: var(--bg); background: var(--fg);
                     padding: .12rem .5rem; margin-right: .6rem; letter-spacing: .08em;
                     text-transform: uppercase; }
  .cal-entry a { color: var(--fg); }

  /* トレンド */
  .trend-row { display: flex; align-items: center; gap: .9rem; padding: .7rem 0;
               border-bottom: 1px solid var(--hair); cursor: pointer; }
  .trend-rank { font-weight: 700; font-size: 1.1rem; width: 1.8rem; text-align: center;
                font-variant-numeric: tabular-nums; }
  .trend-bar { height: 3px; background: var(--accent); }
  .trend-label { flex: 1; font-size: .92rem; letter-spacing: .02em; }
  .trend-count { color: var(--muted); font-size: .72rem; letter-spacing: .06em; }

  .empty { color: var(--muted); margin-top: 2.5rem; font-size: .88rem; line-height: 1.8; }
  footer { max-width: 900px; margin: 3rem auto 0; padding: 2rem 1.5rem 3.5rem;
           border-top: 1px solid var(--line); }
  footer p { color: var(--muted); font-size: .68rem; line-height: 1.9; margin: 0;
             letter-spacing: .02em; }
</style>
</head>
<body>
<header>
  <h1>CDG <span>Watch</span></h1>
  <div class="meta" id="meta">読み込み中…</div>
  <div class="links">CDG FREAK:
    <a href="https://cdg-freak.com/" target="_blank" rel="noopener">Web</a>
    <a href="https://www.instagram.com/cdgfreakcom" target="_blank" rel="noopener">Instagram</a>
    <a href="https://x.com/CDGFREAKcom" target="_blank" rel="noopener">X</a>
    <span style="opacity:.5"> · </span>
    <a href="https://cdg-freak.com/brand/" target="_blank" rel="noopener">ライン別コレクション一覧</a>
    <span style="opacity:.5"> · </span>
    <a href="https://ginza.doverstreetmarket.com/pages/new-items" target="_blank" rel="noopener">ドーバー銀座 新着</a>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-view="news">ニュース</button>
    <button class="tab" data-view="calendar">リリースカレンダー</button>
    <button class="tab" data-view="trend">トレンド</button>
    <button class="tab" data-view="saved">☆ 保存</button>
  </div>
  <div class="controls" id="newsControls">
    <input type="search" id="q" placeholder="キーワードで絞り込み…">
    <select id="feed"><option value="">すべてのソース</option></select>
  </div>
  <div class="chips" id="chips"></div>
</header>
<main id="list"></main>
<footer>
  <p>個人が運営する非公式のファンサイトです。COMME des GARÇONS 公式とは一切関係ありません。
  掲載情報は各報道機関・公式RSS等の公開情報を集約したもので、著作権は各出典に帰属します。
  詳細・正確な情報は必ず各リンク先および公式サイトでご確認ください。</p>
</footer>
<script>
const fmtDay = iso => new Date(iso).toLocaleDateString("ja-JP",
  { year: "numeric", month: "long", day: "numeric", weekday: "short" });
const DOW = ["日","月","火","水","木","金","土"];
const CATS = ["新作","コラボ","ショー/コレクション","店舗","インタビュー","再販/セール","二次流通"];

let items = [], schedule = { storeLaunches: [], productDrops: [] };
let view = "news", cat = "__official", feed = "", q = "", calPast = false;
let favs = new Set(JSON.parse(localStorage.getItem("cdg_favs") || "[]"));

const saveFavs = () => localStorage.setItem("cdg_favs", JSON.stringify([...favs]));
const esc = s => (s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

function cardHTML(i) {
  const on = favs.has(i.id) ? "on" : "";
  return `<article class="card" data-id="${i.id}">
    <div class="body">
      <a class="title" href="${esc(i.url)}" target="_blank" rel="noopener">${esc(i.title)}</a>
      <button class="fav ${on}" title="保存">${favs.has(i.id) ? "★" : "☆"}</button>
      <div class="src">${esc(i.publisher ?? i.feed)}</div>
      ${i.summary ? `<div class="summary">${esc(i.summary)}</div>` : ""}
      ${i.tags?.length ? `<div class="tags">${i.tags.map(t => `<span class="tag">${esc(t)}</span>`).join("")}</div>` : ""}
    </div>
    ${i.image ? `<img class="thumb" src="${esc(i.image)}" alt="" loading="lazy"
      referrerpolicy="no-referrer" onerror="this.remove()">` : ""}
  </article>`;
}

function matchNews(i) {
  const inCat = cat === ""      ? true
    : cat === "__official"      ? !(i.tags ?? []).includes("二次流通")
    : cat === "__saved"         ? favs.has(i.id)
    :                             (i.tags ?? []).includes(cat);
  const inFeed = !feed || i.feed === feed;
  const inQ = !q || (i.title + " " + (i.summary ?? "") + " " + (i.publisher ?? ""))
    .toLowerCase().includes(q.toLowerCase());
  return inCat && inFeed && inQ;
}

function renderNews(savedOnly) {
  const list = document.getElementById("list");
  let out = "";
  const hit = items.filter(i => savedOnly ? favs.has(i.id) : matchNews(i));

  // 今日の要点(絞り込みなし・通常ビューのみ)
  if (!savedOnly && !q && cat === "__official" && !feed) {
    const official = items.filter(i => !(i.tags ?? []).includes("二次流通"));
    // importance が付いていれば優先、無ければ新着順。上位3件
    const hl = [...official]
      .sort((a, b) => (b.importance ?? 0) - (a.importance ?? 0))
      .slice(0, 3);
    if (hl.length) {
      out += `<div class="highlights"><h2>今日の要点</h2>` + hl.map(i => `
        <div class="hl-card">
          <a href="${esc(i.url)}" target="_blank" rel="noopener">${esc(i.title)}</a>
          ${i.image ? `<img src="${esc(i.image)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove()">` : ""}
        </div>`).join("") + `</div>`;
    }
  }

  if (!hit.length) {
    out += `<p class="empty">${savedOnly ? "保存した記事はまだありません。☆ボタンで保存できます。" : "該当する記事がありません。"}</p>`;
    list.innerHTML = out; return;
  }
  let day = null;
  for (const i of hit) {
    const d = i.publishedAt ? fmtDay(i.publishedAt) : "日付不明";
    if (d !== day) { day = d; out += `</section><section class="day"><h2>${d}</h2>`; }
    out += cardHTML(i);
  }
  list.innerHTML = out + "</section>";
}

function renderCalendar() {
  const list = document.getElementById("list");
  const today = new Date(); today.setHours(0, 0, 0, 0);
  let entries = [
    ...schedule.storeLaunches.map(e => ({ ...e, kind: "店頭立ち上がり" })),
    ...schedule.productDrops.map(e => ({ ...e, kind: "発売" })),
  ].filter(e => e.date);
  entries = calPast
    ? entries.filter(e => new Date(e.date) < today).sort((a, b) => b.date.localeCompare(a.date))
    : entries.filter(e => new Date(e.date) >= today).sort((a, b) => a.date.localeCompare(b.date));

  const toggle = `<div class="highlights"><h2>リリースカレンダー</h2>
    <div class="chips"><button class="chip ${!calPast ? "active" : ""}" id="calUpcoming">今後の予定</button>
    <button class="chip ${calPast ? "active" : ""}" id="calPast">過去の履歴</button></div></div>`;
  const bind = () => {
    document.getElementById("calUpcoming").onclick = () => { calPast = false; renderCalendar(); };
    document.getElementById("calPast").onclick = () => { calPast = true; renderCalendar(); };
  };

  if (!entries.length) {
    list.innerHTML = toggle + `<p class="empty">${calPast ? "過去の履歴はありません。" :
      "今後の発売・立ち上がり予定はまだ登録されていません。<br>毎朝のエージェントが CDG FREAK のスケジュールや記事から自動で追加します。"}</p>`;
    bind(); return;
  }
  let out = toggle, curDate = null;
  for (const e of entries) {
    if (e.date !== curDate) {
      curDate = e.date;
      const dt = new Date(e.date);
      const days = Math.round((dt - today) / 86400000);
      const until = days === 0 ? "今日" : days === 1 ? "明日"
        : days > 0 ? `あと${days}日` : `${-days}日前`;
      out += `<div class="cal-day"><div class="cal-date">${dt.getMonth()+1}月${dt.getDate()}日
        <span class="dow">(${DOW[dt.getDay()]})</span><span class="cal-until">${until}</span></div>`;
    }
    const label = e.title || e.label || (e.stores ? e.stores.join("・") : "");
    const extra = [e.brand, e.price, e.where, e.note].filter(Boolean).join(" / ");
    out += `<div class="cal-entry"><span class="kind">${esc(e.kind)}</span>
      ${e.url ? `<a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(label)}</a>` : esc(label)}
      ${extra ? `<div class="src">${esc(extra)}</div>` : ""}</div>`;
  }
  list.innerHTML = out;
  bind();
}

function renderTrend() {
  const list = document.getElementById("list");
  // 直近30日で集計。少なすぎる場合は全期間にフォールバック
  const monthAgo = Date.now() - 30 * 86400000;
  let recent = items.filter(i => i.publishedAt && new Date(i.publishedAt).getTime() > monthAgo);
  let windowLabel = "直近30日";
  if (recent.length < 20) { recent = items; windowLabel = "全期間"; }
  const KEYS = [
    ["JUNYA WATANABE", /junya|ジュンヤ/i], ["HOMME PLUS", /homme plus|オムプリュス/i],
    ["PLAY", /\bplay\b|プレイ/i], ["SHIRT", /shirt|シャツ/i], ["Noir Kei Ninomiya", /noir|ノワール|二宮/i],
    ["Nike/コラボ", /nike|jordan|new balance|ナイキ|コラボ|collab/i], ["BLACK", /\bblack\b|ブラック/i],
    ["CDG(ライン)", /\bcdg\b/i], ["香水/香り", /perfume|parfum|香水|フレグランス/i],
  ];
  const counts = KEYS.map(([label, re]) => [label, recent.filter(i => re.test(i.title + " " + (i.summary ?? ""))).length])
    .filter(([, c]) => c > 0).sort((a, b) => b[1] - a[1]);
  if (!counts.length) { list.innerHTML = `<p class="empty">直近7日のトレンドを集計できませんでした。</p>`; return; }
  const max = counts[0][1];
  list.innerHTML = `<div class="highlights"><h2>${windowLabel}の話題ランキング</h2></div>` +
    counts.map(([label, c], idx) => `
      <div class="trend-row" data-q="${esc(label)}">
        <span class="trend-rank">${idx + 1}</span>
        <span class="trend-label">${esc(label)}</span>
        <span class="trend-bar" style="width:${Math.max(12, (c / max) * 180)}px"></span>
        <span class="trend-count">${c}件</span>
      </div>`).join("");
  list.querySelectorAll(".trend-row").forEach(r => r.addEventListener("click", () => {
    q = r.dataset.q; cat = ""; setView("news");
    document.getElementById("q").value = q;
  }));
}

function render() {
  document.getElementById("newsControls").style.display =
    (view === "news" || view === "saved") ? "flex" : "none";
  document.getElementById("chips").style.display = view === "news" ? "flex" : "none";
  if (view === "calendar") return renderCalendar();
  if (view === "trend") return renderTrend();
  if (view === "saved") return renderNews(true);
  renderNews(false);
}

function setView(v) {
  view = v;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.view === v));
  render();
}

function buildChips() {
  const chips = document.getElementById("chips");
  const defs = [["新品・ニュース", "__official"], ["すべて", ""], ...CATS.map(c => [c, c])];
  chips.innerHTML = defs.map(([label, val]) =>
    `<button class="chip ${val === cat ? "active" : ""}" data-cat="${val}">${label}</button>`).join("");
  chips.querySelectorAll(".chip").forEach(c => c.addEventListener("click", () => {
    cat = c.dataset.cat;
    chips.querySelectorAll(".chip").forEach(x => x.classList.toggle("active", x.dataset.cat === cat));
    render();
  }));
}

document.getElementById("list").addEventListener("click", e => {
  const btn = e.target.closest(".fav");
  if (!btn) return;
  const id = btn.closest(".card").dataset.id;
  if (favs.has(id)) favs.delete(id); else favs.add(id);
  saveFavs(); render();
});
document.getElementById("tabs").addEventListener("click", e => {
  const t = e.target.closest(".tab"); if (t) setView(t.dataset.view);
});
document.getElementById("q").addEventListener("input", e => { q = e.target.value.trim(); render(); });

Promise.all([
  fetch("data/items.json").then(r => r.json()),
  fetch("data/schedule.json").then(r => r.json()).catch(() => ({ storeLaunches: [], productDrops: [] })),
]).then(([data, sched]) => {
  items = data.items; schedule = sched;
  document.getElementById("meta").textContent =
    `${items.length}件 · 最終更新 ${new Date(data.updatedAt).toLocaleString("ja-JP")}`;
  const sel = document.getElementById("feed");
  for (const f of [...new Set(items.map(i => i.feed))]) sel.add(new Option(f, f));
  sel.addEventListener("change", e => { feed = e.target.value; render(); });
  buildChips();
  render();
}).catch(() => {
  document.getElementById("meta").textContent = "データの読み込みに失敗しました。";
});
</script>
</body>
</html>
